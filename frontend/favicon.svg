<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Gradient matching the app's blue-purple theme -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)"/>

  <!-- Checkmark inside a circle (QA / test pass) -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="white" stroke-width="3.5" stroke-opacity="0.95"/>
  <path d="M 22 33 L 29 40 L 43 25"
        fill="none"
        stroke="white"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- AI sparkle in top-right (matches the ✨ Generate button) -->
  <path d="M 50 14 L 51.5 18 L 55.5 19.5 L 51.5 21 L 50 25 L 48.5 21 L 44.5 19.5 L 48.5 18 Z"
        fill="url(#sparkleGrad)"/>

  <!-- Small accent sparkle -->
  <circle cx="14" cy="16" r="1.5" fill="white" fill-opacity="0.7"/>
</svg>
